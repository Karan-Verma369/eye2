<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>BlinkCare — Game Page</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
  body { font-family:sans-serif; background:linear-gradient(135deg, #0f0c29, #302b63, #24243e); display:flex; flex-direction:column; align-items:center; padding:1rem; color:white; min-height:100vh; }
  canvas { border:3px solid #4ade80; border-radius:12px; background:linear-gradient(180deg, #000428, #004e92); box-shadow:0 0 30px rgba(74,222,128,0.3); }
  .status { margin-top:1rem; font-size:1.2rem; font-weight:bold; color:#4ade80; text-shadow:0 0 10px rgba(74,222,128,0.5); }
  @keyframes pulse { 0%, 100% { opacity:1; } 50% { opacity:0.5; } }
</style>
</head>
<body>

<h1 class="text-3xl font-bold mb-4" style="text-shadow:0 0 20px rgba(74,222,128,0.6);">🎮 BlinkCare — Eye Shooter</h1>
<canvas id="gameCanvas" width="800" height="600"></canvas>
<div class="status" id="status">Status: Initializing...</div>
<button onclick="goBack()" class="mt-4 px-6 py-3 bg-gradient-to-r from-green-500 to-emerald-600 rounded-lg hover:from-green-600 hover:to-emerald-700 font-semibold shadow-lg transition-all">🔙 Back to Menu</button>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');

// ---------------- Eye Blink Detection ----------------
let lastBlink = 0;
const blinkThreshold = 0.22;
const blinkCooldown = 15; // frames
let blinkCounter = 0;

const videoElement = document.createElement('video');
videoElement.autoplay = true;
videoElement.muted = true;
videoElement.playsInline = true;

const LEFT_EYE = [33, 160, 158, 133, 153, 144];
const RIGHT_EYE = [362, 385, 387, 263, 373, 380];

function distance(p1, p2){ return Math.hypot(p1.x - p2.x, p1.y - p2.y); }
function eyeAspectRatio(landmarks, indices){
  const [p1,p2,p3,p4,p5,p6] = indices.map(i=>landmarks[i]);
  const A = distance(p2,p6);
  const B = distance(p3,p5);
  const C = distance(p1,p4);
  return (A+B)/(2*C);
}

const faceMesh = new FaceMesh({locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
faceMesh.setOptions({maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.5, minTrackingConfidence:0.5});
faceMesh.onResults(results=>{
  if(results.multiFaceLandmarks.length>0){
    const lm = results.multiFaceLandmarks[0].map(p=>({x:p.x, y:p.y}));
    const leftEAR = eyeAspectRatio(lm, LEFT_EYE);
    const rightEAR = eyeAspectRatio(lm, RIGHT_EYE);
    const ear = (leftEAR+rightEAR)/2;
    if(ear < blinkThreshold && (Date.now()-lastBlink)>300){
      lastBlink = Date.now();
      blinkCounter++;
    }
  }
});

const camera = new Camera(videoElement, {onFrame: async()=>{ await faceMesh.send({image: videoElement}); }, width:640, height:480});
camera.start().then(()=>{statusEl.textContent="Camera ready. Blink to shoot!";});

// ---------------- Game Variables ----------------
let gunX = canvas.width/2;
const gunY = canvas.height - 40;
const gunWidth = 60, gunHeight = 20;
let movingRight = true;
const gunSpeed = 5;

let bullets = [];
const bulletSpeed = 10;

let enemies = [];
const enemyWidth = 50, enemyHeight = 30;
let enemySpeed = 2;
let enemyTimer = 0;
let enemySpawnTime = 90;

let score = 0;
let lives = 3;
let level = 1;
const bulletsPerBlink = 1;
let gameOver = false;
let selectedOption = 0; // 0 = retry, 1 = go back

let particles = [];
let stars = [];
for(let i=0; i<100; i++){
  stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, size:Math.random()*2});
}

// ---------------- Helper Functions ----------------
function goBack(){ window.location.href="index.html"; }

function drawStars(){
  ctx.fillStyle="white";
  stars.forEach(s=>{
    ctx.globalAlpha = 0.5 + Math.random()*0.5;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  });
  ctx.globalAlpha = 1;
}

function drawGun(){
  // Gun body with gradient
  const gradient = ctx.createLinearGradient(gunX, gunY, gunX, gunY+gunHeight);
  gradient.addColorStop(0, '#4ade80');
  gradient.addColorStop(1, '#22c55e');
  ctx.fillStyle = gradient;
  ctx.shadowBlur = 15;
  ctx.shadowColor = '#4ade80';
  ctx.fillRect(gunX, gunY, gunWidth, gunHeight);
  
  // Gun barrel
  ctx.fillStyle = '#86efac';
  ctx.fillRect(gunX+gunWidth/2-5, gunY-10, 10, 10);
  ctx.shadowBlur = 0;
}

function drawBullets(){
  bullets.forEach(b=>{
    const gradient = ctx.createRadialGradient(b.x+5, b.y+10, 0, b.x+5, b.y+10, 8);
    gradient.addColorStop(0, '#fef08a');
    gradient.addColorStop(0.5, '#fbbf24');
    gradient.addColorStop(1, '#f59e0b');
    ctx.fillStyle = gradient;
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#fbbf24';
    ctx.fillRect(b.x, b.y, b.width, b.height);
  });
  ctx.shadowBlur = 0;
}

function drawEnemies(){
  enemies.forEach(e=>{
    const gradient = ctx.createLinearGradient(e.x, e.y, e.x, e.y+e.height);
    gradient.addColorStop(0, '#ef4444');
    gradient.addColorStop(1, '#dc2626');
    ctx.fillStyle = gradient;
    ctx.shadowBlur = 10;
    ctx.shadowColor = '#ef4444';
    ctx.fillRect(e.x, e.y, e.width, e.height);
    
    // Enemy eyes
    ctx.fillStyle = '#fef3c7';
    ctx.fillRect(e.x+10, e.y+8, 8, 8);
    ctx.fillRect(e.x+32, e.y+8, 8, 8);
  });
  ctx.shadowBlur = 0;
}

function createExplosion(x, y){
  for(let i=0; i<15; i++){
    particles.push({
      x:x, y:y,
      vx:(Math.random()-0.5)*6,
      vy:(Math.random()-0.5)*6,
      life:30,
      color:`hsl(${Math.random()*60+30}, 100%, 60%)`
    });
  }
}

function updateParticles(){
  particles.forEach((p,i)=>{
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    if(p.life<=0) particles.splice(i,1);
  });
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha = p.life/30;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x, p.y, 4, 4);
  });
  ctx.globalAlpha = 1;
}

function drawUI(){
  ctx.fillStyle="white";
  ctx.font="bold 24px Arial";
  ctx.shadowBlur = 5;
  ctx.shadowColor = '#000';
  ctx.fillText("⭐ "+score, 20, 35);
  ctx.fillText("🎯 "+level, 20, 65);
  
  // Hearts for lives
  ctx.font="30px Arial";
  for(let i=0; i<lives; i++){
    ctx.fillText("❤️", 700+i*35, 35);
  }
  ctx.shadowBlur = 0;
}

function drawGameOver(){
  // Dark overlay
  ctx.fillStyle = "rgba(0, 0, 0, 0.8)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Game Over text
  ctx.fillStyle = "#ef4444";
  ctx.font = "bold 60px Arial";
  ctx.shadowBlur = 15;
  ctx.shadowColor = "#ef4444";
  ctx.textAlign = "center";
  ctx.fillText("GAME OVER", canvas.width/2, 150);
  
  // Score
  ctx.fillStyle = "#4ade80";
  ctx.font = "bold 36px Arial";
  ctx.shadowColor = "#4ade80";
  ctx.fillText("Score: " + score, canvas.width/2, 220);
  
  // Options
  const option1Y = 320;
  const option2Y = 400;
  
  // Retry option
  if(selectedOption === 0){
    ctx.fillStyle = "#4ade80";
    ctx.shadowBlur = 20;
    ctx.shadowColor = "#4ade80";
  } else {
    ctx.fillStyle = "#9ca3af";
    ctx.shadowBlur = 5;
    ctx.shadowColor = "#000";
  }
  ctx.font = "bold 32px Arial";
  ctx.fillText("🔄 RETRY", canvas.width/2, option1Y);
  
  // Go Back option
  if(selectedOption === 1){
    ctx.fillStyle = "#4ade80";
    ctx.shadowBlur = 20;
    ctx.shadowColor = "#4ade80";
  } else {
    ctx.fillStyle = "#9ca3af";
    ctx.shadowBlur = 5;
    ctx.shadowColor = "#000";
  }
  ctx.fillText("🔙 GO BACK", canvas.width/2, option2Y);
  
  // Instructions
  ctx.fillStyle = "#fbbf24";
  ctx.font = "20px Arial";
  ctx.shadowBlur = 5;
  ctx.shadowColor = "#000";
  ctx.fillText("Gun moves to select • Blink to confirm", canvas.width/2, 500);
  
  ctx.textAlign = "left";
  ctx.shadowBlur = 0;
}

// ---------------- Game Loop ----------------
function updateGame(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(gameOver){
    // Game over screen logic
    // Gun movement controls option selection
    if(movingRight){ 
      gunX += gunSpeed; 
      if(gunX>canvas.width-gunWidth){
        movingRight=false;
        selectedOption = 1; // Go back option
      }
    } else{ 
      gunX -= gunSpeed; 
      if(gunX<0){
        movingRight=true;
        selectedOption = 0; // Retry option
      }
    }
    
    // Blink to confirm selection
    if(blinkCounter>0){
      if(selectedOption === 0){
        resetGame();
        gameOver = false;
      } else {
        window.location.href="index.html";
      }
      blinkCounter = 0;
    }
    
    drawStars();
    drawGameOver();
    requestAnimationFrame(updateGame);
    return;
  }

  // Gun movement auto
  if(movingRight){ gunX += gunSpeed; if(gunX>canvas.width-gunWidth)movingRight=false; }
  else{ gunX -= gunSpeed; if(gunX<0)movingRight=true; }

  // Blink shooting
  if(blinkCounter>0){
    for(let i=0;i<bulletsPerBlink;i++){
      bullets.push({x:gunX+gunWidth/2-5, y:gunY-10, width:10, height:20});
    }
    blinkCounter = 0;
  }

  // Move bullets
  bullets.forEach((b,i)=>{
    b.y -= bulletSpeed;
    if(b.y<0) bullets.splice(i,1);
  });

  // Spawn enemies
  enemyTimer++;
  if(enemyTimer>=enemySpawnTime){
    const x = Math.random()*(canvas.width-enemyWidth);
    enemies.push({x:x, y:-enemyHeight, width:enemyWidth, height:enemyHeight});
    enemyTimer=0;
  }

  // Move enemies
  enemies.forEach((e,i)=>{
    e.y += enemySpeed;
    if(e.y>canvas.height){ 
      enemies.splice(i,1); 
      lives--; 
      if(lives<=0){ 
        gameOver = true;
        selectedOption = 0;
      } 
    }
  });

  // Bullet collision
  for(let i=bullets.length-1; i>=0; i--){
    let hit = false;
    for(let j=enemies.length-1; j>=0; j--){
      const b = bullets[i];
      const e = enemies[j];
      if(b && e && b.x<e.x+e.width && b.x+b.width>e.x && b.y<e.y+e.height && b.y+b.height>e.y){
        createExplosion(e.x+e.width/2, e.y+e.height/2);
        bullets.splice(i,1);
        enemies.splice(j,1);
        score += 10;
        hit = true;
        
        // Level up every 100 points
        if(score%100===0 && score>0){
          level++;
          enemySpeed += 0.5;
          enemySpawnTime = Math.max(30, enemySpawnTime-10);
        }
        break;
      }
    }
    if(hit) break;
  }
  
  updateParticles();

  // Draw everything
  drawStars();
  drawGun();
  drawBullets();
  drawEnemies();
  drawParticles();
  drawUI();

  requestAnimationFrame(updateGame);
}

function resetGame(){
  score=0; lives=3; level=1; bullets=[]; enemies=[]; gunX=canvas.width/2; enemySpeed=2; enemySpawnTime=90;
}

// Start loop
updateGame();

</script>

</body>
</html>
