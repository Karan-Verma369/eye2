<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Database Management - BlinkCare</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 10px;
      padding: 30px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    h1 {
      color: #333;
      margin-bottom: 30px;
      text-align: center;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.3s;
    }

    button:hover {
      background: #764ba2;
    }

    button.delete {
      background: #e74c3c;
    }

    button.delete:hover {
      background: #c0392b;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }

    th {
      background: #667eea;
      color: white;
      font-weight: 600;
    }

    tr:hover {
      background: #f5f5f5;
    }

    .empty-message {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Database Management</h1>
    <div class="button-group">
      <button onclick="loadUsers()">Refresh Users</button>
      <button onclick="clearDatabase()">Clear All Data</button>
      <button class="back-link" onclick="window.location.href='/login.html'">← Back to Login</button>
    </div>

    <table id="usersTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Username</th>
          <th>Blood Group</th>
          <th>Medical Condition</th>
          <th>Contact</th>
          <th>Doctor</th>
          <th>Allergies</th>
          <th>Created</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr>
          <td colspan="9" class="empty-message">Loading...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    function loadUsers() {
      fetch('/api/users')
        .then(res => res.json())
        .then(data => {
          const tableBody = document.getElementById('tableBody');
          if (data.users.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="9" class="empty-message">No users found</td></tr>';
            return;
          }

          tableBody.innerHTML = data.users.map(user => `
            <tr>
              <td>${user.id}</td>
              <td>${user.username}</td>
              <td>${user.blood_group || 'N/A'}</td>
              <td>${user.medical_condition || 'N/A'}</td>
              <td>${user.contact_number || 'N/A'}</td>
              <td>${user.doctor_name || 'N/A'}</td>
              <td>${user.allergies || 'N/A'}</td>
              <td>${new Date(user.created_at).toLocaleDateString()}</td>
              <td><button class="delete" onclick="deleteUser(${user.id})">Delete</button></td>
            </tr>
          `).join('');
        })
        .catch(err => {
          document.getElementById('tableBody').innerHTML = '<tr><td colspan="9" class="empty-message">Error loading users</td></tr>';
          console.error('Error:', err);
        });
    }

    function deleteUser(id) {
      if (confirm('Are you sure you want to delete this user?')) {
        fetch('/api/delete-user', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id })
        })
        .then(res => res.json())
        .then(data => {
          if (data.success) {
            loadUsers();
          }
        });
      }
    }

    function clearDatabase() {
      if (confirm('This will delete ALL users. Are you sure?')) {
        fetch('/api/users')
          .then(res => res.json())
          .then(data => {
            data.users.forEach(user => deleteUser(user.id));
            loadUsers();
          });
      }
    }

    // Load users on page load
    loadUsers();
  </script>
</body>
</html>
