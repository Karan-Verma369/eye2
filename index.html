<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BlinkCare — Blink Detection</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    * { font-family: 'Inter', sans-serif; }
    body { 
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      height: 100vh;
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center;
      padding: 1rem;
      margin: 0;
      overflow: hidden;
    }
    .container {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 1.5rem;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 650px;
      width: 100%;
      max-height: 95vh;
      overflow: hidden;
    }
    .header { text-align: center; margin-bottom: 1rem; }
    .logo {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.25rem;
    }
    .subtitle { color: #6b7280; font-size: 0.9rem; font-weight: 500; }
    .status { 
      text-align: center;
      margin-top: 0.75rem; 
      font-size: 1rem; 
      font-weight: 600; 
      color: #667eea;
      padding: 0.5rem;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
      border-radius: 12px;
      border: 2px solid rgba(102, 126, 234, 0.2);
    }
    .button-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.75rem; margin-top: 1rem; width: 100%; }
    .selectable { 
      background: linear-gradient(135deg, #ffffff 0%, #f9fafb 100%);
      border: 3px solid #e5e7eb;
      border-radius: 16px; 
      padding: 1.5rem; 
      font-size: 1.1rem; 
      font-weight: 700; 
      text-align: center; 
      cursor: pointer; 
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .selectable::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 0;
    }
    .selectable > * { position: relative; z-index: 1; }
    .selectable:hover { transform: translateY(-2px); border-color: #667eea; box-shadow: 0 8px 25px rgba(102, 126, 234, 0.2); }
    .selectable:hover::before { opacity: 1; }
    .selectable.highlight { 
      transform: translateY(-6px) scale(1.05);
      border-color: #667eea;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4); }
      50% { box-shadow: 0 15px 50px rgba(102, 126, 234, 0.6); }
    }
    .instructions {
      text-align: center;
      margin-top: 1rem;
      padding: 0.75rem;
      background: rgba(102, 126, 234, 0.05);
      border-radius: 12px;
      color: #4b5563;
      font-size: 0.85rem;
      line-height: 1.4;
    }
    .instructions strong { color: #667eea; font-weight: 600; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">👁️ BlinkCare</div>
    <div class="subtitle">Assistive Communication System</div>
  </div>

  <div class="status" id="status">⏳ Initializing camera...</div>

  <div class="button-grid">
    <div class="selectable" data-action="call-nurse">
      <span class="icon">👩‍⚕️</span>
      <span class="label">Call Nurse</span>
    </div>
    <div class="selectable" data-action="emergency">
      <span class="icon">🚨</span>
      <span class="label">Emergency</span>
    </div>
    <div class="selectable" data-action="phrases">
      <span class="icon">💬</span>
      <span class="label">Phrases</span>
    </div>
    <div class="selectable" data-action="game">
      <span class="icon">🎮</span>
      <span class="label">Game</span>
    </div>
  </div>

  <div class="instructions">
    <strong>How to use:</strong> The system will automatically scan through options. 
    Blink when your desired option is highlighted to select it.
  </div>

  <!-- Optional Manual Logout -->
  <div style="text-align:center;margin-top:10px;">
    <button onclick="logout()" 
      style="background:#e74c3c;color:white;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;">
      Logout
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
function logout() {
  localStorage.clear();
  alert("You have been logged out.");
  window.location.href = "./login.html";
}

// Blink-based navigation logic
const videoElement = document.createElement('video');
videoElement.style.display = 'none';
document.body.appendChild(videoElement);

const statusEl = document.getElementById('status');
const buttons = Array.from(document.querySelectorAll('.selectable'));

let lastBlink = 0;
const blinkThreshold = 0.22;
const blinkCooldown = 800;
let currentIndex = 0;
const scanInterval = 1500;

function highlightButton(i) {
  buttons.forEach(btn => btn.classList.remove('highlight'));
  if (buttons[i]) buttons[i].classList.add('highlight');
}
function nextButton() {
  currentIndex = (currentIndex + 1) % buttons.length;
  highlightButton(currentIndex);
}
function clickCurrent() {
  const btn = buttons[currentIndex];
  if (!btn) return;
  const action = btn.dataset.action;
  statusEl.textContent = `✓ Selected: ${action}`;
  handleAction(action);
}
function handleAction(action) {
  switch (action) {
    case 'call-nurse': speak("Nurse has been called"); break;
    case 'emergency': speak("Emergency alert triggered"); window.location.href = "./emergency.html"; break;
    case 'phrases': speak("Please choose a phrase"); window.location.href = "./phrases.html"; break;
    case 'game': speak("Opening game page"); window.location.href = "./game.html"; break;
  }
}
function speak(text) {
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = 'en-US';
  window.speechSynthesis.speak(msg);
}
function startScanner() {
  highlightButton(currentIndex);
  setInterval(nextButton, scanInterval);
}

// FaceMesh initialization
const LEFT_EYE = [33, 160, 158, 133, 153, 144];
const RIGHT_EYE = [362, 385, 387, 263, 373, 380];
function distance(a,b){ return Math.hypot(a.x-b.x,a.y-b.y); }
function ear(landmarks, eye){
  const p = eye.map(i=>landmarks[i]);
  const A = distance(p[1],p[5]);
  const B = distance(p[2],p[4]);
  const C = distance(p[0],p[3]);
  return C===0?1:(A+B)/(2*C);
}

const faceMesh = new FaceMesh({ locateFile: (file)=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}` });
faceMesh.setOptions({ maxNumFaces:1, refineLandmarks:true, minDetectionConfidence:0.5, minTrackingConfidence:0.5 });
faceMesh.onResults(results=>{
  if(results.multiFaceLandmarks.length>0){
    const l=results.multiFaceLandmarks[0];
    const e=((ear(l,LEFT_EYE)+ear(l,RIGHT_EYE))/2);
    const now=Date.now();
    if(e<blinkThreshold && (now-lastBlink)>blinkCooldown){
      lastBlink=now; clickCurrent();
    }
  }
});

const camera = new Camera(videoElement, {
  onFrame: async()=>{ await faceMesh.send({image:videoElement}); },
  width:320, height:240
});
camera.start().then(()=>{
  statusEl.textContent='✓ Camera active — Blink to select highlighted option';
  startScanner();
}).catch(err=>{
  statusEl.textContent=`❌ Camera error: ${err.message}`;
  console.error(err);
});
</script>
</body>
</html>
