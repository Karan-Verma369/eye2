<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BlinkCare — Phrases</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom right, #E0F2FE, #F0F9FF);
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      padding: 1rem;
    }
    .app-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-start;
      gap: 2rem;
      margin-top: 1rem;
    }
    video {
      border: 3px solid #3B82F6;
      border-radius: 12px;
      width: 300px;
      height: 220px;
      box-shadow: 0 8px 20px rgba(59,130,246,0.2);
    }
    .status {
      margin-top: 0.6rem;
      font-size: 1rem;
      font-weight: 600;
      color: #1E3A8A;
      text-align: center;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 1rem;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
      width: 260px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      transition: all 0.3s ease;
    }
    .card:hover { transform: translateY(-3px); }
    .category {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1E40AF;
      text-align: center;
      margin-bottom: 0.4rem;
    }
    .selectable {
      background: #F8FAFC;
      border: 2px solid transparent;
      border-radius: 10px;
      padding: 0.6rem;
      width: 100%;
      font-size: 1rem;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .selectable:hover { background: #EFF6FF; }
    .selectable.highlight {
      border-color: #3B82F6;
      background: #DBEAFE;
      transform: scale(1.05);
      box-shadow: 0 0 10px rgba(59,130,246,0.4);
    }
    .footer-btn {
      margin-top: 0.8rem;
      padding: 0.7rem 1.5rem;
      border-radius: 10px;
      background-color: #2563EB;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    .footer-btn:hover { background-color: #1E40AF; }
  </style>
</head>
<body>

  <h1 class="text-3xl font-bold text-blue-800 mb-3">💬 BlinkCare — Phrases</h1>

  <video id="video" autoplay muted playsinline></video>
  <div class="status" id="status">Status: Waiting...</div>

  <!-- Phrase Selection Section -->
  <div class="app-container" id="phrase-section">
    <div class="card">
      <div class="category">👋 Greetings</div>
      <div class="selectable" data-phrase="Hello, how are you?">Hello, how are you?</div>
      <div class="selectable" data-phrase="Good morning!">Good morning!</div>
      <div class="selectable" data-phrase="Good evening!">Good evening!</div>
    </div>

    <div class="card">
      <div class="category">🍽️ Needs</div>
      <div class="selectable" data-phrase="I need water.">I need water.</div>
      <div class="selectable" data-phrase="I am hungry.">I am hungry.</div>
      <div class="selectable" data-phrase="Please call the nurse.">Please call the nurse.</div>
    </div>

    <div class="card">
      <div class="category">😊 Feelings</div>
      <div class="selectable" data-phrase="I am feeling unwell.">I am feeling unwell.</div>
      <div class="selectable" data-phrase="I am happy today.">I am happy today.</div>
      <div class="selectable" data-phrase="I am sad.">I am sad.</div>
    </div>
  </div>

  <!-- Confirmation Section (Hidden initially) -->
  <div class="app-container hidden" id="confirmation-section">
    <div class="card">
      <div class="category text-blue-700">✅ Confirm your selection</div>
      <div class="selectable" data-action="yes">✅ Yes — Speak phrase</div>
      <div class="selectable" data-action="repeat">🔁 Repeat phrase</div>
    </div>
  </div>

  <button class="footer-btn" data-action="back">🔙 Go Back</button>

  <!-- MediaPipe JS -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

  <script>
    const videoElement = document.getElementById('video');
    const statusEl = document.getElementById('status');
    const phraseSection = document.getElementById('phrase-section');
    const confirmSection = document.getElementById('confirmation-section');
    let currentIndex = 0, scannerTimer = null;
    const scanInterval = 1500, blinkThreshold = 0.22, blinkCooldown = 800;
    let lastBlink = 0, selectedPhrase = null, inConfirmation = false;
    let repeatInterval = null;

    // Returns only currently visible buttons
    function getVisibleButtons() {
      return Array.from(document.querySelectorAll('.selectable:not(.hidden), .footer-btn:not(.hidden)'))
        .filter(btn => btn.offsetParent !== null);
    }

    function highlightButton(idx) {
      getVisibleButtons().forEach(b => b.classList.remove('highlight'));
      if (getVisibleButtons()[idx]) getVisibleButtons()[idx].classList.add('highlight');
    }

    function nextButton() {
      const visible = getVisibleButtons();
      if (visible.length === 0) return;
      currentIndex = (currentIndex + 1) % visible.length;
      highlightButton(currentIndex);
    }

    function speak(text) {
      const msg = new SpeechSynthesisUtterance(text);
      msg.lang = 'en-US';
      window.speechSynthesis.speak(msg);
    }

    function stopRepeat() {
      if (repeatInterval) {
        clearInterval(repeatInterval);
        repeatInterval = null;
      }
    }

    function goBackToPhrases() {
      stopRepeat();
      confirmSection.classList.add('hidden');
      phraseSection.classList.remove('hidden');
      inConfirmation = false;
      currentIndex = 0;
      highlightButton(currentIndex);
    }

    function clickCurrent() {
      const btn = getVisibleButtons()[currentIndex];
      if (!btn) return;
      const action = btn.dataset.action;
      const phrase = btn.dataset.phrase;

      if (action === 'back') {
        window.location.href = "index.html";
      } 
      else if (phrase) {
        selectedPhrase = phrase;
        phraseSection.classList.add('hidden');
        confirmSection.classList.remove('hidden');
        inConfirmation = true;
        currentIndex = 0;
        highlightButton(currentIndex);
      } 
      else if (action === 'yes') {
        speak(selectedPhrase);
        setTimeout(goBackToPhrases, 2000);
      } 
      else if (action === 'repeat') {
        stopRepeat();
        speak(selectedPhrase);
        repeatInterval = setInterval(() => {
          speak(selectedPhrase);
        }, 3000);
      } 
    }

    function startScanner() {
      highlightButton(currentIndex);
      if (scannerTimer) clearInterval(scannerTimer);
      scannerTimer = setInterval(nextButton, scanInterval);
    }

    // Eye landmarks for blink detection
    const LEFT_EYE = [33, 160, 158, 133, 153, 144];
    const RIGHT_EYE = [362, 385, 387, 263, 373, 380];
    const distance = (a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
    const eyeAspectRatio = (lm, idx)=>{
      const [p1,p2,p3,p4,p5,p6] = idx.map(i=>lm[i]);
      return (distance(p2,p6)+distance(p3,p5))/(2*distance(p1,p4));
    };

    const faceMesh = new FaceMesh({locateFile:file=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
    faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.5,minTrackingConfidence:0.5});
    faceMesh.onResults(results=>{
      if(results.multiFaceLandmarks.length>0){
        const lm = results.multiFaceLandmarks[0].map(p=>({x:p.x,y:p.y}));
        const ear = (eyeAspectRatio(lm,LEFT_EYE)+eyeAspectRatio(lm,RIGHT_EYE))/2;
        const now = Date.now();
        if(ear<blinkThreshold && (now-lastBlink)>blinkCooldown){
          lastBlink = now;
          clickCurrent();
        }
      }
    });

    const camera = new Camera(videoElement, {
      onFrame: async()=>{ await faceMesh.send({image: videoElement}); },
      width:320, height:240
    });
    camera.start().then(()=>{ 
      statusEl.textContent="Camera running. Blink to select!";
      startScanner(); 
    })
    .catch(err=>{ 
      statusEl.textContent=`Camera error: ${err.message}`; 
      console.error(err); 
    });
  </script>
</body>
</html>
